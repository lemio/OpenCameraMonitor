<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EOS Preview">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23000' width='192' height='192'/><circle cx='96' cy='96' r='60' fill='%23fff'/><circle cx='96' cy='96' r='40' fill='%23000'/></svg>">
    <title>Canon EOS Preview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Camera Preview -->
        <div id="preview-container" class="preview-container">
            <img id="preview" alt="Camera Preview" class="preview">
            <button id="capture-thumb-button" class="capture-thumb-button" hidden>
                <img id="capture-thumb" alt="Latest Capture" class="capture-thumb">
            </button>
        </div>

        <!-- Control UI -->
        <div class="control-panel">
            <!-- Top Status Bar -->
            <div class="status-bar">
                <div class="status-item">
                    <svg class="status-icon battery-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="18" height="12" rx="1"></rect>
                        <line x1="22" y1="9" x2="22" y2="15"></line>
                    </svg>
                    <span id="battery" class="value">--</span>
                </div>
                <div class="status-item">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L15.09 8.26H22L17.45 12.79L19.54 19.26L12 14.73L4.46 19.26L6.55 12.79L2 8.26H8.91L12 2Z"></path>
                    </svg>
                    <span id="shutter-speed" class="value">--</span>
                </div>
                <div class="status-item">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6V12L16 14"></path>
                    </svg>
                    <span id="iso" class="value">--</span>
                </div>
                <div class="status-item">
                    <svg class="status-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-13c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5z"></path>
                    </svg>
                    <span id="wb" class="value">--</span>
                </div>
            </div>

            <!-- Exposure Dial -->
            <div class="exposure-dial" style="display: none;">
                <div class="exposure-label">Exposure</div>
                <div class="exposure-scale">
                    <div class="tick tick-5">-5</div>
                    <div class="tick tick-4">-4</div>
                    <div class="tick tick-3">-3</div>
                    <div class="tick tick-2">-2</div>
                    <div class="tick tick-1">-1</div>
                    <div class="tick tick-0">0</div>
                    <div class="tick tick-1">+1</div>
                    <div class="tick tick-2">+2</div>
                    <div class="tick tick-3">+3</div>
                    <div class="tick tick-4">+4</div>
                    <div class="tick tick-5">+5</div>
                </div>
                <div class="exposure-indicator"></div>
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <!-- Left Side Controls -->
                <div class="left-controls">
                    <button id="preview-toggle" class="control-button preview-btn" title="Toggle Live Preview">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z"></path>
                            <circle cx="12" cy="12" r="2.5"></circle>
                        </svg>
                    </button>
                </div>

                <!-- Center Shutter Button -->
                <button id="shutter-button" class="shutter-button" title="Capture Photo">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="8" opacity="0.3"></circle>
                        <circle cx="12" cy="12" r="6"></circle>
                    </svg>
                </button>

                <!-- Right Side Controls -->
                <div class="right-controls">
                    <div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Capture Fullscreen Viewer -->
    <div id="capture-modal" class="capture-modal" hidden>
        <img id="capture-modal-image" class="capture-modal-image" alt="Captured Image Fullscreen">
    </div>

    <!-- Status Toast -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .catch(() => {
                    // Service worker registration failed, but app will still work
                });
        }
    </script>
</body>
</html>
